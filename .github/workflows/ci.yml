# ═══════════════════════════════════════════════════════════════════════════════
# ggnmem — Continuous Integration
#
# Triggers:
#   • Every push to main
#   • Every pull request targeting main
#
# Jobs:
#   fmt     — cargo fmt --check
#   clippy  — cargo clippy (all targets, deny warnings)
#   test    — cargo test (entire workspace)
#   build   — cargo build --release (ensures release profile compiles)
# ═══════════════════════════════════════════════════════════════════════════════

name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Formatting ──────────────────────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ─── Lint ────────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: clippy-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: clippy-${{ runner.os }}-

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ─── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: test-${{ runner.os }}-

      - name: Run tests
        run: cargo test --workspace

  # ─── Release build check ────────────────────────────────────────────────────
  build:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: build-${{ runner.os }}-

      - name: Build release binaries
        run: cargo build --release --workspace
