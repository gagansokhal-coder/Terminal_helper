# ═══════════════════════════════════════════════════════════════════════════════
# ggnmem — Automated Release Pipeline
#
# Trigger:
#   Push a tag matching  vX.Y.Z  or  vX.Y.Z-<pre>  (e.g. v0.3.1-alpha)
#
#   git tag -a v0.4.0-alpha -m "v0.4.0-alpha"
#   git push origin v0.4.0-alpha
#
# Pipeline stages:
#   1. gate    — version verification + full CI checks (fmt, clippy, tests)
#   2. build   — compile release binaries for Linux (x86_64, aarch64) and Windows (x86_64)
#   3. verify  — extract archives and verify binary versions match tag
#   4. release — create GitHub Release with assets and auto-generated notes
#
# Version safety:
#   The pipeline will FAIL if:
#   - Tag version (v0.3.2-alpha) != Cargo.toml version (0.3.2-alpha)
#   - Binary `ggnmem version` output != tag version
#
# Generated release assets:
#   • ggnmem-linux-x86_64.tar.gz
#   • ggnmem-linux-aarch64.tar.gz
#   • ggnmem-windows-x86_64.zip
#   • checksums.txt
#   • RELEASE_NOTES.md
#
# Prerelease detection:
#   Tags like v1.0.0-alpha, v1.0.0-beta.2, v1.0.0-rc.1 are marked as
#   prerelease on GitHub automatically.
# ═══════════════════════════════════════════════════════════════════════════════

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ═════════════════════════════════════════════════════════════════════════════════
jobs:
  # ─── Stage 1: Quality gate ─────────────────────────────────────────────────
  gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: gate-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: gate-${{ runner.os }}-

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "Tag version:       $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"

          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo ""
            echo "::error::Version mismatch! Tag $TAG has version '$TAG_VERSION' but Cargo.toml has '$CARGO_VERSION'"
            echo "::error::Update Cargo.toml version to '$TAG_VERSION' before tagging, or delete the tag and re-tag after fixing."
            exit 1
          fi

          echo "✓ Versions match: $TAG_VERSION"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  # ─── Stage 2: Build Linux release binaries ─────────────────────────────────
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    needs: gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64)
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Configure linker (aarch64)
        if: matrix.arch == 'aarch64'
        run: |
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: build-linux-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: build-linux-${{ matrix.arch }}-

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "rustc=$(rustc --version | sed 's/rustc \([^ ]*\).*/\1/')" >> "$GITHUB_OUTPUT"

      - name: Assemble release directory
        run: |
          bash scripts/assemble_release.sh \
            --target "${{ matrix.target }}" \
            --arch   "${{ matrix.arch }}" \
            --version "${{ steps.meta.outputs.version }}" \
            --commit  "${{ steps.meta.outputs.commit }}" \
            --date    "${{ steps.meta.outputs.date }}" \
            --rustc   "${{ steps.meta.outputs.rustc }}"

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: |
            ggnmem-linux-${{ matrix.arch }}.tar.gz
          retention-days: 1

  # ─── Stage 2b: Build Windows release binary ────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    needs: gate
    runs-on: windows-latest
    env:
      # ONNX Runtime (ort-sys) is prebuilt with /MD (dynamic CRT).
      # CARGO_CFG_TARGET_FEATURE does NOT reflect -C target-feature changes
      # from rustflags (Cargo limitation), so the cc crate defaults to /MT
      # for esaxx-rs and libsqlite3-sys, causing LNK2038 mismatch.
      # Fix: force /MD via CFLAGS/CXXFLAGS (cc crate appends these AFTER
      # its own flags; MSVC uses the last specified runtime flag).
      CFLAGS: "/MD"
      CXXFLAGS: "/MD"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Clean build artifacts
        run: cargo clean

      - name: Build release binaries
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Extract version from tag
        id: meta
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag -replace '^v', ''
          $commit = git rev-parse --short HEAD
          $date = Get-Date -Format "yyyy-MM-dd"
          $rustc = (rustc --version) -replace 'rustc ([^ ]+).*', '$1'

          "tag=$tag"         >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "commit=$commit"   >> $env:GITHUB_OUTPUT
          "date=$date"       >> $env:GITHUB_OUTPUT
          "rustc=$rustc"     >> $env:GITHUB_OUTPUT

      - name: Assemble release ZIP
        shell: pwsh
        run: |
          pwsh scripts/assemble_release_windows.ps1 `
            -Target  "x86_64-pc-windows-msvc" `
            -Arch    "x86_64" `
            -Version "${{ steps.meta.outputs.version }}" `
            -Commit  "${{ steps.meta.outputs.commit }}" `
            -Date    "${{ steps.meta.outputs.date }}" `
            -RustcVer "${{ steps.meta.outputs.rustc }}"

      - name: Upload release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86_64
          path: |
            ggnmem-windows-x86_64.zip
          retention-days: 1

  # ─── Stage 2.5: Verify built binary versions ───────────────────────────────
  verify:
    name: Verify binary versions
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-linux-x86_64
          path: artifacts

      - name: Download Windows x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows-x86_64
          path: artifacts

      - name: Verify Linux binary version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"

          echo "Expected version: $TAG_VERSION"
          echo ""

          # Extract tarball
          mkdir -p verify-linux
          tar xzf artifacts/ggnmem-linux-x86_64.tar.gz -C verify-linux

          # Check binary exists and is executable
          if [ ! -f verify-linux/ggnmem ]; then
            echo "::error::ggnmem binary not found in tarball"
            exit 1
          fi
          chmod +x verify-linux/ggnmem

          # Get binary version output
          BINARY_VERSION=$(verify-linux/ggnmem version 2>&1 | head -1 | sed 's/ggnmem //')
          echo "Linux binary version: $BINARY_VERSION"

          if [ "$BINARY_VERSION" != "$TAG_VERSION" ]; then
            echo ""
            echo "::error::Linux binary version mismatch! Tag expects '$TAG_VERSION' but binary reports '$BINARY_VERSION'"
            echo "::error::Ensure Cargo.toml version is updated and committed before tagging."
            exit 1
          fi

          echo "✓ Linux binary version matches tag: $BINARY_VERSION"

          # Also verify VERSION file inside tarball
          if [ -f verify-linux/VERSION ]; then
            FILE_VERSION=$(grep '^version=' verify-linux/VERSION | cut -d= -f2)
            echo "VERSION file:     $FILE_VERSION"

            if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::VERSION file mismatch! Expected '$TAG_VERSION' but got '$FILE_VERSION'"
              exit 1
            fi

            echo "✓ VERSION file matches tag: $FILE_VERSION"
          fi

      - name: Verify Windows ZIP contents
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"

          echo ""
          echo "Verifying Windows ZIP..."

          mkdir -p verify-windows
          cd verify-windows
          unzip -q ../artifacts/ggnmem-windows-x86_64.zip
          cd ..

          # Check required files
          MISSING=""
          for f in ggnmem.exe ggnmem-daemon.exe VERSION README.md checksums.txt; do
            if [ ! -f "verify-windows/$f" ]; then
              MISSING="$MISSING $f"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::Windows ZIP is missing required files:$MISSING"
            exit 1
          fi

          echo "✓ All required files present in Windows ZIP"

          # Verify VERSION file
          if [ -f verify-windows/VERSION ]; then
            FILE_VERSION=$(grep '^version=' verify-windows/VERSION | cut -d= -f2)
            echo "Windows VERSION file: $FILE_VERSION"

            if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
              echo "::error::Windows VERSION file mismatch! Expected '$TAG_VERSION' but got '$FILE_VERSION'"
              exit 1
            fi

            PLATFORM=$(grep '^platform=' verify-windows/VERSION | cut -d= -f2)
            if [ "$PLATFORM" != "windows" ]; then
              echo "::error::Windows VERSION file has wrong platform: '$PLATFORM'"
              exit 1
            fi

            echo "✓ Windows VERSION file matches tag: $FILE_VERSION (platform=$PLATFORM)"
          fi

      - name: Print verification summary
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"

          echo ""
          echo "═══════════════════════════════════════"
          echo "  All version checks passed"
          echo "  Tag:     $TAG"
          echo "  Release: $TAG_VERSION"
          echo "  Linux:   ✓ verified"
          echo "  Windows: ✓ verified"
          echo "═══════════════════════════════════════"

  # ─── Stage 3: Create GitHub Release ────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        id: assets
        run: |
          mkdir -p dist
          cp artifacts/release-linux-x86_64/ggnmem-linux-x86_64.tar.gz    dist/
          cp artifacts/release-linux-aarch64/ggnmem-linux-aarch64.tar.gz   dist/
          cp artifacts/release-windows-x86_64/ggnmem-windows-x86_64.zip   dist/

          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt
          cd ..

          echo "dir=dist" >> "$GITHUB_OUTPUT"

      - name: Detect prerelease
        id: pre
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          bash scripts/generate_release_notes.sh \
            --version "$VERSION" \
            --tag     "$TAG" \
            --dist    "${{ steps.assets.outputs.dir }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ggnmem ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          prerelease: ${{ steps.pre.outputs.prerelease }}
          files: |
            ${{ steps.assets.outputs.dir }}/ggnmem-linux-x86_64.tar.gz
            ${{ steps.assets.outputs.dir }}/ggnmem-linux-aarch64.tar.gz
            ${{ steps.assets.outputs.dir }}/ggnmem-windows-x86_64.zip
            ${{ steps.assets.outputs.dir }}/checksums.txt
          fail_on_unmatched_files: true
